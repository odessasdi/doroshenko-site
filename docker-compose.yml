services:
  mysql:
    image: mysql:8.4
    container_name: artist_mysql
    environment:
      MYSQL_DATABASE: artist
      MYSQL_USER: artist
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
